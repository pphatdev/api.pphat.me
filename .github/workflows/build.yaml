name: "Build"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  node-20:
    name: "Testing - Node 20"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Types
        run: npm run cf-typegen

      - name: Run Tests
        run: npm run test

      - name: Job Summary
        if: always()
        run: |
          echo "## Node 20 Results 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Status: **${{ job.status }}**" >> $GITHUB_STEP_SUMMARY

  node-22:
