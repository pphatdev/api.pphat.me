name: "🧪 Testing before Build"

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: "Build and Deploy (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Wrangler Types
        run: npm run cf-typegen

      - name: Testing
        run: npm run test

      - name: Job Summary
        if: always()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "# 🏭 API.PPHAT.ME v$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "## 🧪 Testing Summary for Node Version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "The testing process for **${{ github.repository }}** has completed with status: **${{ job.status }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version:** ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📜 Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All tests passed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed. Please check the logs for more information." >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📦 Archive Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.node-version == 24
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          zip -r "api-pphat-me-$VERSION.zip" . -x "node_modules/*" ".git/*" ".github/*" "tests/*"

      - name: 🚀 Create Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.node-version == 24
        uses: softprops/action-gh-release@v2
        with:
          files: api-pphat-me-*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: 🛡️ Attest Build Provenance
        if: startsWith(github.ref, 'refs/tags/') && matrix.node-version == 24
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'api-pphat-me-*.zip'
        