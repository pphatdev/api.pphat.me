name: "🚀 Release New Version"

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    strategy:
      matrix:
        node-version: ["20", "22", "24"]
    uses: ./.github/workflows/test-jobs.yaml
    with:
      node-version: ${{ matrix.node-version }}
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 🏷️ Get Version Info
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PACKAGE_VERSION=$(node -p "require('./package.json').version")
            echo "version=v$PACKAGE_VERSION-pr${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Archive Release
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          zip -r "api-pphat-me-$VERSION.zip" . -x "node_modules/*" ".git/*" ".github/*" "tests/*"

      - name: 🛡️ Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'api-pphat-me-*.zip'

      - name: 🚀 Create / Update Release
        uses: softprops/action-gh-release@v2.0.9
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: api-pphat-me-*.zip
          generate_release_notes: true
          draft: ${{ github.event_name == 'pull_request' }}
          prerelease: ${{ github.event_name == 'pull_request' }}